<!DOCTYPE html>
<html>
<head>
    <title>Event Sign Up</title>
</head>
<body>
    <h1>Sign Up for {{ event.title }}</h1>

    <p>{{ event.location }}</p>
    <p>{{ event.start_time }} - {{ event.end_time }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>

    <a href="{% url 'localevents:event-detail' event.pk %}">← Back</a>

</body>
</html>
