{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card-cg">
        <div class="card-header-cg">
            Sign Up for {{ event.title }}
        </div>

        <div class="card-body">

            <div class="mb-3">
                <span class="tag-cg"><i class="bi bi-geo-alt"></i> {{ event.location }}</span>
                <span class="tag-cg"><i class="bi bi-clock"></i> {{ event.start_time }} - {{ event.end_time }}</span>
            </div>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label-cg">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-golden">
                    Submit
                </button>
            </form>

            <div class="mt-3">
                <a href="{% url 'localevents:event-detail' event.pk %}" class="cg-soft">
                    ← Back
                </a>
            </div>

        </div>
    </div>

</div>

{% endblock %}
