{% extends 'base.html' %}
{% block title %}Login &mdash; Common Grounds{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 440px;">

    <div class="text-center mb-4">
        <div style="width: 54px; height: 54px; background: var(--golden); border-radius: 16px;
                    display: flex; align-items: center; justify-content: center;
                    margin: 0 auto 1rem; box-shadow: 0 4px 16px rgba(253, 194, 0, 0.28);">
            <i class="bi bi-person-fill" style="color: var(--text); font-size: 1.5rem;"></i>
        </div>
        <h1 class="fw-800" style="font-size: 1.7rem;">Welcome back!</h1>
        <p class="text-secondary-cg">Log in to Common Grounds</p>
    </div>

    <div class="card-cg">
        <div class="card-body">  

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label-cg" for="{{ field.id_for_label }}">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.errors %}
                            <div class="mt-1 small" style="color: var(--accent);">
                                {{ field.errors.0 }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-golden w-100">
                    Login
                </button>
            </form>

            <hr class="divider-cg">

            <div class="text-center mt-2" style="font-size: 0.85rem;">
                <a href="{% url 'password_reset' %}" class="text-muted-cg">
                    Forgot your password?
                </a>
            </div>

        </div>
    </div>

</div>
{% endblock %}
