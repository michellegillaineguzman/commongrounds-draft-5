{% extends "base.html" %}

{% block title %}Permission Denied{% endblock %}

{% block content %}

<div class="container py-5" style="max-width: 500px;">

    <div class="text-center mb-4">
        <div style="width: 56px; height: 56px; background: var(--accent-light);
                    border-radius: 16px; display: flex; align-items: center;
                    justify-content: center; margin: 0 auto 1rem;
                    box-shadow: 0 4px 16px rgba(255,107,107,0.2);">
            <i class="bi bi-shield-lock-fill" style="color: var(--accent); font-size: 1.5rem;"></i>
        </div>

        <h1 class="fw-800" style="font-size: 1.7rem;">Permission Denied</h1>
        <p class="text-secondary-cg">
            You do not have permission to access this page.
        </p>
    </div>

    <div class="card-cg">
        <div class="card-body text-center">

            <p class="text-muted-cg mb-3">
                If you think this is a mistake, try logging in with the correct account.
            </p>

            <a href="{% url 'home' %}" class="btn btn-golden">
                Back to Home
            </a>

        </div>
    </div>

</div>

{% endblock %}
