<!DOCTYPE html>
<html>
    <head>
        <title>Book List</title>
    </head>
    <body>
        <h1>Books</h1>
        <ul>
            {% for book in books %}
                <li>
                    <a href="{% url 'bookclub:book_detail' book.pk %}">{{ book.title }}</a>
                </li>
            {% endfor %}
        </ul>
    </body>
</html>
