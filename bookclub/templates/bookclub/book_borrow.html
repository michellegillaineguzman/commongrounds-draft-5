{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card-cg">
        <div class="card-header-cg">Borrow: {{ book.title }}</div>
        <div class="card-body">
            <div class="mb-3">
                <span class="tag-cg"><i class="bi bi-person"></i> {{ book.author }}</span>
            </div>
            <p class="text-muted">Confirm your details to borrow this book.</p>
            <form method="post">{% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label-cg">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <div class="alert alert-info py-2 small" style="background: #fdfaf3; border: 1px solid #e9e4dc; color: #3b2f2f;">
                    <i class="bi bi-info-circle"></i> Note: Return date is 14 days from the borrow date.
                </div>
                <button type="submit" class="btn btn-golden">Confirm Borrow</button>
                <a href="{% url 'bookclub:book_detail' book.pk %}" class="btn btn-outline-cg ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
