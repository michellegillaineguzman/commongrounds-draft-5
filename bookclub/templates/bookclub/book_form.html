{% extends "base.html" %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="card-cg">
        <div class="card-header-cg">{% if form.instance.pk %}Edit Book{% else %}Contribute a Book{% endif %}</div>
        <div class="card-body">
            <form method="post">{% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label-cg">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                {% endfor %}
                <div class="mt-4">
                    <button type="submit" class="btn btn-golden">Save</button>
                    <a href="{% url 'bookclub:book_list' %}" class="btn btn-outline-cg ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
